<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Panda perdido</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!-- Latest compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Latest compiled JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
       * {
        box-sizing: border-box;
       }

       body {
        background-color: rgba(245, 245, 245, 0.747);
       }

       .tabla-404 {
        text-align: center;
        align-items: center;
        margin-top: 20px;
        margin-left: 600px;
        background-color: white;
        border: solid 2px rgb(0, 26, 255);
        border-radius: 20px;
        height: 90dvh;
        width: 30%;
        padding: 10px;
       }

       .error-header p {
        color: #001fa8;
        margin: 0;
        font-size: 8dvh;
        font-weight: bolder;
       }

       .error-header small {
        font-size: 10dvh;
        color: #0027a8;
        margin: 0;
       }

       .error-body p {
        background-color: aliceblue;
        padding: 20px;
        border-radius: 50px;
        border-left: solid 10px #0548ff;
        margin-top: 30px;
       }

       .error-footer a {
        margin-top: 90px;
        padding: 20px;
        background-color: #0019a8;
        border: 0;
        border-radius: 10px;
        color: white;
        text-decoration: none;
       }

       .error-footer a:hover {
        background-color: #a80000;
       }

       .error-footer {
        margin-top: 20px;
        border-top: dotted;
       }

       .error-footer p{
          margin: 0;
          margin-top: 2px;
          font-size: 2dvh;
          color: #a80000;
       }

       .error-footer a{
        margin: 0;
       }

    </style>
</head>
<body>
    <main class="tabla-404">
    <section class="main-error">
        <div class="error-header">
            <small>404</small>
            <h1>¡Ooopss página no encontrada!</h1>
        </div>
        <div class="error-body">
            <p><i class="fa-solid fa-xmark"></i>Esta página se perdió entre los CV.</p>
        </div>
        <div class="error-footer">
            <a href="index.html" class="btn"><i class="fa-solid fa-house"></i>Volver al inicio</a>
        </div>
    </section>
    </main>
</body>
</html>
